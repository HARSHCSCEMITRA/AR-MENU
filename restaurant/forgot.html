<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password — ARMenu</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--primary:#00D4FF;--secondary:#7B2FFF;--bg:#050810;--card:#111827;--text:#f0f4ff;--text-muted:#8892a4;--border:rgba(0,212,255,0.15);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .bg-orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:0.2;pointer-events:none;}
    .orb1{width:400px;height:400px;background:var(--primary);top:-100px;right:-100px;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:44px 40px;width:100%;max-width:400px;position:relative;z-index:1;box-shadow:0 0 60px rgba(0,212,255,0.1);text-align:center;}
    .icon{font-size:52px;margin-bottom:16px;}
    .title{font-size:24px;font-weight:800;margin-bottom:6px;}
    .sub{font-size:14px;color:var(--text-muted);margin-bottom:28px;line-height:1.6;}
    .form-input{width:100%;padding:13px 16px;background:rgba(255,255,255,0.05);border:1.5px solid var(--border);border-radius:10px;font-size:15px;color:var(--text);outline:none;font-family:'Inter',sans-serif;margin-bottom:14px;}
    .form-input:focus{border-color:var(--primary);}
    .form-input::placeholder{color:var(--text-muted);}
    .btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--primary),var(--secondary));border:none;border-radius:12px;font-size:15px;font-weight:800;color:#050810;cursor:pointer;transition:all 0.2s;}
    .btn:disabled{opacity:0.6;cursor:default;}
    .back{margin-top:16px;font-size:13px;color:var(--text-muted);}
    .back a{color:var(--primary);text-decoration:none;font-weight:600;}
    .alert{padding:12px 16px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:14px;display:none;}
    .alert.error{background:rgba(255,77,79,0.1);border:1px solid rgba(255,77,79,0.3);color:#ff4d4f;}
    .alert.success{background:rgba(82,196,26,0.1);border:1px solid rgba(82,196,26,0.3);color:#52c41a;}
  </style>
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="card">
    <div class="icon">🔐</div>
    <div class="title">Reset Password</div>
    <div class="sub">Enter your email and we'll send you a password reset link.</div>
    <div class="alert" id="alertBox"></div>
    <input class="form-input" id="email" type="email" placeholder="owner@restaurant.com"/>
    <button class="btn" id="sendBtn" onclick="sendReset()">📧 Send Reset Link</button>
    <div class="back"><a href="login.html">← Back to Login</a></div>
  </div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    const firebaseConfig = {
      apiKey:"AIzaSyD8_c3y8cUP3w1uG7CL3GGn_GqraWxbdWs",
      authDomain:"ar-menu-39559.firebaseapp.com",
      projectId:"ar-menu-39559",
      storageBucket:"ar-menu-39559.firebasestorage.app",
      messagingSenderId:"919934973947",
      appId:"1:919934973947:web:c9bba718bcbc8ba6967d5e"
    };
    const auth = getAuth(initializeApp(firebaseConfig));
    window.sendReset = async function(){
      const email = document.getElementById('email').value.trim();
      const btn = document.getElementById('sendBtn');
      const al = document.getElementById('alertBox');
      if(!email){al.className='alert error';al.textContent='⚠️ Enter your email.';al.style.display='block';return;}
      btn.disabled=true; btn.textContent='⏳ Sending...';
      try{
        await sendPasswordResetEmail(auth,email);
        al.className='alert success';al.textContent='📧 Reset link sent! Check your inbox.';al.style.display='block';
        btn.textContent='✅ Email Sent';
      }catch(e){
        al.className='alert error';al.textContent='❌ '+e.message;al.style.display='block';
        btn.disabled=false;btn.textContent='📧 Send Reset Link';
      }
    };
  </script>
</body>
</html>
