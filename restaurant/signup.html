<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — ARMenu</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--primary:#00D4FF;--secondary:#7B2FFF;--bg:#050810;--bg2:#0a0f1e;--card:#111827;--text:#f0f4ff;--text-muted:#8892a4;--border:rgba(0,212,255,0.15);--error:#ff4d4f;--success:#52c41a;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .bg-orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:0.2;pointer-events:none;}
    .orb1{width:400px;height:400px;background:var(--primary);top:-100px;left:-100px;}
    .orb2{width:300px;height:300px;background:var(--secondary);bottom:-80px;right:-80px;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:40px;width:100%;max-width:520px;position:relative;z-index:1;box-shadow:0 0 60px rgba(0,212,255,0.1);}
    .logo{text-align:center;margin-bottom:20px;}
    .logo-icon{font-size:36px;margin-bottom:6px;}
    .logo-text{font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .card-title{font-size:24px;font-weight:800;text-align:center;margin-bottom:4px;}
    .card-sub{font-size:14px;color:var(--text-muted);text-align:center;margin-bottom:20px;}
    /* GOOGLE BUTTON */
    .btn-google{width:100%;padding:13px;background:#fff;border:1.5px solid #e0e0e0;border-radius:12px;font-size:15px;font-weight:700;color:#1a1a1a;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.2s;margin-bottom:14px;}
    .btn-google:hover{background:#f5f5f5;box-shadow:0 4px 16px rgba(0,0,0,0.15);transform:translateY(-1px);}
    .btn-google:disabled{opacity:0.6;cursor:default;transform:none;}
    .google-icon{width:20px;height:20px;flex-shrink:0;}
    /* DIVIDER */
    .divider{display:flex;align-items:center;gap:12px;margin:4px 0 16px;}
    .divider-line{flex:1;height:1px;background:var(--border);}
    .divider-text{font-size:12px;color:var(--text-muted);white-space:nowrap;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .form-group{margin-bottom:14px;}
    .form-label{font-size:13px;font-weight:600;margin-bottom:5px;display:block;color:var(--text-muted);}
    .form-input,.form-select{width:100%;padding:11px 14px;background:rgba(255,255,255,0.05);border:1.5px solid var(--border);border-radius:10px;font-size:14px;color:var(--text);outline:none;transition:border-color 0.2s;font-family:'Inter',sans-serif;}
    .form-input:focus,.form-select:focus{border-color:var(--primary);}
    .form-select option{background:#111827;color:var(--text);}
    .form-input::placeholder{color:var(--text-muted);}
    .password-wrap{position:relative;}
    .eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;}
    .btn-submit{width:100%;padding:15px;background:linear-gradient(135deg,var(--primary),var(--secondary));border:none;border-radius:12px;font-size:16px;font-weight:800;color:#050810;cursor:pointer;margin-top:6px;transition:all 0.2s;box-shadow:0 0 30px rgba(0,212,255,0.3);}
    .btn-submit:hover{transform:translateY(-1px);}
    .btn-submit:disabled{opacity:0.6;cursor:default;transform:none;}
    .login-link{text-align:center;font-size:14px;color:var(--text-muted);margin-top:14px;}
    .login-link a{color:var(--primary);font-weight:600;text-decoration:none;}
    .alert{padding:12px 16px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:14px;display:none;}
    .alert.error{background:rgba(255,77,79,0.1);border:1px solid rgba(255,77,79,0.3);color:#ff4d4f;}
    .alert.success{background:rgba(82,196,26,0.1);border:1px solid rgba(82,196,26,0.3);color:#52c41a;}
    .strength-bar{height:4px;border-radius:2px;background:var(--border);margin-top:5px;overflow:hidden;}
    .strength-fill{height:100%;width:0%;border-radius:2px;transition:all 0.3s;}
    @media(max-width:500px){.form-row{grid-template-columns:1fr;}}
  </style>
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🍽️</div>
      <div class="logo-text">ARMenu</div>
    </div>
    <div class="card-title">Create Your Account</div>
    <div class="card-sub">14-day free trial — no credit card needed</div>

    <div class="alert" id="alertBox"></div>

    <!-- GOOGLE SIGNUP -->
    <button class="btn-google" id="googleBtn" onclick="doGoogleSignup()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Sign up with Google — Instant Access
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">OR fill form below</div>
      <div class="divider-line"></div>
    </div>

    <form id="signupForm" onsubmit="return false;">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Restaurant Name *</label>
          <input class="form-input" id="restName" placeholder="e.g. Spice Garden"/>
        </div>
        <div class="form-group">
          <label class="form-label">Owner Name *</label>
          <input class="form-input" id="ownerName" placeholder="Your full name"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address *</label>
        <input class="form-input" id="email" type="email" placeholder="owner@restaurant.com"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Phone Number *</label>
          <input class="form-input" id="phone" type="tel" placeholder="+91 98765 43210"/>
        </div>
        <div class="form-group">
          <label class="form-label">City *</label>
          <input class="form-input" id="city" placeholder="e.g. Mumbai"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Restaurant Type *</label>
        <select class="form-select" id="restType">
          <option value="">Select type...</option>
          <option>Restaurant</option><option>Cafe</option><option>Dhaba</option>
          <option>Hotel</option><option>Food Truck</option><option>Cloud Kitchen</option><option>Bakery</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Password *</label>
        <div class="password-wrap">
          <input class="form-input" id="password" type="password" placeholder="Min. 8 characters" oninput="checkStrength(this.value)"/>
          <button type="button" class="eye-btn" onclick="togglePwd('password',this)">👁️</button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthBar"></div></div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password *</label>
        <div class="password-wrap">
          <input class="form-input" id="confirmPwd" type="password" placeholder="Repeat password"/>
          <button type="button" class="eye-btn" onclick="togglePwd('confirmPwd',this)">👁️</button>
        </div>
      </div>
      <button class="btn-submit" id="submitBtn" onclick="doSignup()">
        🚀 Create Account & Start Free Trial
      </button>
    </form>
    <div class="login-link">Already have an account? <a href="login.html">Login here</a></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, updateProfile, signInWithPopup, signInWithRedirect, getRedirectResult, GoogleAuthProvider, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD8_c3y8cUP3w1uG7CL3GGn_GqraWxbdWs",
      authDomain: "aaremenu.vercel.app",
      projectId: "ar-menu-39559",
      storageBucket: "ar-menu-39559.firebasestorage.app",
      messagingSenderId: "919934973947",
      appId: "1:919934973947:web:c9bba718bcbc8ba6967d5e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    await setPersistence(auth, browserLocalPersistence);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();

    // ── GOOGLE REDIRECT RESULT (page load pe check karo) ──
    getRedirectResult(auth).then(async (result) => {
      if (!result) return;
      const user = result.user;
      try {
        const restRef = doc(db, 'restaurants', user.uid);
        const snap = await getDoc(restRef);
        if (!snap.exists()) {
          await setDoc(restRef, {
            uid: user.uid,
            restaurantName: user.displayName || 'My Restaurant',
            ownerName: user.displayName || '',
            email: user.email,
            phone: '',
            city: '',
            restaurantType: '',
            plan: 'trial',
            trialEnds: new Date(Date.now() + 14 * 24 * 60 * 60 * 1000),
            dishCount: 0,
            qrScansTotal: 0,
            isActive: true,
            signupMethod: 'google',
            createdAt: serverTimestamp()
          });
        }
        showAlert('success', '🎉 Google signup successful! Redirecting...');
        setTimeout(() => window.location.href = 'dashboard.html', 1200);
      } catch (err) {
        showAlert('error', '❌ Error saving data: ' + err.message);
      }
    }).catch((err) => {
      if (err.code !== 'auth/no-auth-event') {
        showAlert('error', '❌ Google error: ' + err.message);
      }
    });

    // ── GOOGLE SIGNUP ──
    window.doGoogleSignup = async function() {
      const btn = document.getElementById('googleBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Redirecting to Google...';
      try {
        await signInWithRedirect(auth, googleProvider);
      } catch (err) {
        showAlert('error', '❌ Google error: ' + err.message);
        btn.disabled = false;
        btn.textContent = '🔵 Sign up with Google — Instant Access';
      }
    };

    // ── EMAIL SIGNUP ──
    window.doSignup = async function() {
      const btn = document.getElementById('submitBtn');

      const restName = document.getElementById('restName').value.trim();
      const ownerName = document.getElementById('ownerName').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const city = document.getElementById('city').value.trim();
      const restType = document.getElementById('restType').value;
      const password = document.getElementById('password').value;
      const confirmPwd = document.getElementById('confirmPwd').value;

      if (!restName || !ownerName || !email || !phone || !city || !restType) {
        showAlert('error', '⚠️ Please fill all required fields.'); return;
      }
      if (password.length < 8) { showAlert('error', '⚠️ Password must be at least 8 characters.'); return; }
      if (password !== confirmPwd) { showAlert('error', '⚠️ Passwords do not match!'); return; }

      btn.disabled = true;
      btn.textContent = '⏳ Creating account...';

      try {
        const userCred = await createUserWithEmailAndPassword(auth, email, password);
        await updateProfile(userCred.user, { displayName: ownerName });

        await setDoc(doc(db, 'restaurants', userCred.user.uid), {
          uid: userCred.user.uid,
          restaurantName: restName,
          ownerName, email, phone, city,
          restaurantType: restType,
          plan: 'trial',
          trialEnds: new Date(Date.now() + 14 * 24 * 60 * 60 * 1000),
          dishCount: 0,
          qrScansTotal: 0,
          isActive: true,
          signupMethod: 'email',
          createdAt: serverTimestamp()
        });

        showAlert('success', '🎉 Account created! Redirecting to dashboard...');
        setTimeout(() => window.location.href = 'dashboard.html', 1500);

      } catch (err) {
        const messages = {
          'auth/email-already-in-use': '⚠️ This email is already registered. Please login.',
          'auth/invalid-email': '⚠️ Invalid email address.',
          'auth/weak-password': '⚠️ Password is too weak.'
        };
        showAlert('error', messages[err.code] || '❌ Error: ' + err.message);
        btn.disabled = false;
        btn.textContent = '🚀 Create Account & Start Free Trial';
      }
    };

    function showAlert(type, msg) {
      const el = document.getElementById('alertBox');
      el.className = 'alert ' + type;
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
  <script>
    function togglePwd(id,btn){const el=document.getElementById(id);el.type=el.type==='password'?'text':'password';btn.textContent=el.type==='password'?'👁️':'🙈';}
    function checkStrength(val){const bar=document.getElementById('strengthBar');let s=0;if(val.length>=8)s++;if(/[A-Z]/.test(val))s++;if(/[0-9]/.test(val))s++;if(/[^A-Za-z0-9]/.test(val))s++;const c=['#ff4d4f','#ff7a00','#faad14','#52c41a'];bar.style.width=(s*25)+'%';bar.style.background=c[s-1]||'#ff4d4f';}
  </script>
</body>
</html>
