<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — ARMenu</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--primary:#00D4FF;--secondary:#7B2FFF;--bg:#050810;--card:#111827;--text:#f0f4ff;--text-muted:#8892a4;--border:rgba(0,212,255,0.15);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .bg-orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:0.2;pointer-events:none;}
    .orb1{width:400px;height:400px;background:var(--primary);top:-100px;right:-100px;}
    .orb2{width:300px;height:300px;background:var(--secondary);bottom:-80px;left:-80px;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:44px 40px;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:0 0 60px rgba(0,212,255,0.1);}
    .logo{text-align:center;margin-bottom:28px;}
    .logo-icon{font-size:40px;margin-bottom:8px;}
    .logo-text{font-size:24px;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .card-title{font-size:26px;font-weight:800;text-align:center;margin-bottom:4px;}
    .card-sub{font-size:14px;color:var(--text-muted);text-align:center;margin-bottom:28px;}
    .form-group{margin-bottom:16px;}
    .form-label{font-size:13px;font-weight:600;margin-bottom:6px;display:block;color:var(--text-muted);}
    .form-input{width:100%;padding:13px 16px;background:rgba(255,255,255,0.05);border:1.5px solid var(--border);border-radius:10px;font-size:15px;color:var(--text);outline:none;transition:border-color 0.2s;font-family:'Inter',sans-serif;}
    .form-input:focus{border-color:var(--primary);}
    .form-input::placeholder{color:var(--text-muted);}
    .password-wrap{position:relative;}
    .eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;}
    .forgot-link{text-align:right;margin-top:6px;font-size:12px;}
    .forgot-link a{color:var(--primary);text-decoration:none;}
    .btn-submit{width:100%;padding:15px;background:linear-gradient(135deg,var(--primary),var(--secondary));border:none;border-radius:12px;font-size:16px;font-weight:800;color:#050810;cursor:pointer;margin-top:8px;transition:all 0.2s;box-shadow:0 0 30px rgba(0,212,255,0.3);}
    .btn-submit:hover{transform:translateY(-1px);}
    .btn-submit:disabled{opacity:0.6;cursor:default;transform:none;}
    .signup-link{text-align:center;font-size:14px;color:var(--text-muted);margin-top:20px;}
    .signup-link a{color:var(--primary);font-weight:600;text-decoration:none;}
    .back-link{text-align:center;margin-top:10px;font-size:13px;}
    .back-link a{color:var(--text-muted);text-decoration:none;}
    .alert{padding:12px 16px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:16px;display:none;}
    .alert.error{background:rgba(255,77,79,0.1);border:1px solid rgba(255,77,79,0.3);color:#ff4d4f;display:block;}
    .alert.success{background:rgba(82,196,26,0.1);border:1px solid rgba(82,196,26,0.3);color:#52c41a;display:block;}
    .loader{display:inline-block;width:16px;height:16px;border:2px solid rgba(0,0,0,0.3);border-top-color:#050810;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🍽️</div>
      <div class="logo-text">ARMenu</div>
    </div>
    <div class="card-title">Welcome Back</div>
    <div class="card-sub">Login to your restaurant panel</div>
    <div class="alert" id="alertBox"></div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-input" id="email" type="email" placeholder="owner@restaurant.com"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="password-wrap">
        <input class="form-input" id="password" type="password" placeholder="Your password"/>
        <button type="button" class="eye-btn" onclick="togglePwd()">👁️</button>
      </div>
      <div class="forgot-link"><a href="forgot.html">Forgot password?</a></div>
    </div>
    <button class="btn-submit" id="loginBtn" onclick="doLogin()">Login to Dashboard →</button>
    <div class="signup-link">Don't have an account? <a href="signup.html">Sign up free</a></div>
    <div class="back-link"><a href="../public/index.html">← Back to homepage</a></div>
  </div>

  <script src="../auth.js"></script>
  <script>
    // If already logged in, go to dashboard
    (async () => {
      try {
        const acc = await AW.account.get();
        if (acc) window.location.href = 'dashboard.html';
      } catch(e) {}
    })();

    function togglePwd() {
      const p = document.getElementById('password');
      p.type = p.type === 'password' ? 'text' : 'password';
    }

    function showAlert(type, msg) {
      const box = document.getElementById('alertBox');
      box.className = 'alert ' + type;
      box.innerHTML = msg;
    }

    async function doLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');

      if (!email || !password) { showAlert('error', '⚠️ Please enter email and password.'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="loader"></span>Logging in...';

      try {
        await authLogin(email, password);
        showAlert('success', '✅ Login successful! Redirecting...');
        setTimeout(() => window.location.href = 'dashboard.html', 800);
      } catch (e) {
        const msg = e.message.includes('Invalid credentials') ? 'Invalid email or password.' : e.message;
        showAlert('error', '❌ ' + msg);
        btn.disabled = false;
        btn.innerHTML = 'Login to Dashboard →';
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
