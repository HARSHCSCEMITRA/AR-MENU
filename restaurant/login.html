<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — ARMenu</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--primary:#00D4FF;--secondary:#7B2FFF;--bg:#050810;--card:#111827;--text:#f0f4ff;--text-muted:#8892a4;--border:rgba(0,212,255,0.15);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .bg-orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:0.2;pointer-events:none;}
    .orb1{width:400px;height:400px;background:var(--primary);top:-100px;right:-100px;}
    .orb2{width:300px;height:300px;background:var(--secondary);bottom:-80px;left:-80px;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:44px 40px;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:0 0 60px rgba(0,212,255,0.1);}
    .logo{text-align:center;margin-bottom:28px;}
    .logo-icon{font-size:40px;margin-bottom:8px;}
    .logo-text{font-size:24px;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .card-title{font-size:26px;font-weight:800;text-align:center;margin-bottom:4px;}
    .card-sub{font-size:14px;color:var(--text-muted);text-align:center;margin-bottom:24px;}
    .form-group{margin-bottom:16px;}
    .form-label{font-size:13px;font-weight:600;margin-bottom:6px;display:block;color:var(--text-muted);}
    .form-input{width:100%;padding:13px 16px;background:rgba(255,255,255,0.05);border:1.5px solid var(--border);border-radius:10px;font-size:15px;color:var(--text);outline:none;transition:border-color 0.2s;font-family:'Inter',sans-serif;}
    .form-input:focus{border-color:var(--primary);}
    .form-input::placeholder{color:var(--text-muted);}
    .password-wrap{position:relative;}
    .eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;}
    .forgot-link{text-align:right;margin-top:6px;font-size:12px;}
    .forgot-link a{color:var(--primary);text-decoration:none;}
    .btn-submit{width:100%;padding:15px;background:linear-gradient(135deg,var(--primary),var(--secondary));border:none;border-radius:12px;font-size:16px;font-weight:800;color:#050810;cursor:pointer;margin-top:4px;transition:all 0.2s;box-shadow:0 0 30px rgba(0,212,255,0.3);}
    .btn-submit:hover{transform:translateY(-1px);}
    .btn-submit:disabled{opacity:0.6;cursor:default;transform:none;}

    /* GOOGLE BUTTON */
    .btn-google{width:100%;padding:14px;background:#fff;border:1.5px solid #e0e0e0;border-radius:12px;font-size:15px;font-weight:700;color:#1a1a1a;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.2s;margin-bottom:16px;}
    .btn-google:hover{background:#f5f5f5;box-shadow:0 4px 16px rgba(0,0,0,0.15);transform:translateY(-1px);}
    .btn-google:disabled{opacity:0.6;cursor:default;transform:none;}
    .google-icon{width:20px;height:20px;}

    /* DIVIDER */
    .divider{display:flex;align-items:center;gap:12px;margin:16px 0;}
    .divider-line{flex:1;height:1px;background:var(--border);}
    .divider-text{font-size:12px;color:var(--text-muted);white-space:nowrap;}

    .signup-link{text-align:center;font-size:14px;color:var(--text-muted);margin-top:18px;}
    .signup-link a{color:var(--primary);font-weight:600;text-decoration:none;}
    .back-link{text-align:center;margin-top:10px;font-size:13px;}
    .back-link a{color:var(--text-muted);text-decoration:none;transition:color 0.2s;}
    .back-link a:hover{color:var(--primary);}
    .alert{padding:12px 16px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:14px;display:none;}
    .alert.error{background:rgba(255,77,79,0.1);border:1px solid rgba(255,77,79,0.3);color:#ff4d4f;}
    .alert.success{background:rgba(82,196,26,0.1);border:1px solid rgba(82,196,26,0.3);color:#52c41a;}
  </style>
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🍽️</div>
      <div class="logo-text">ARMenu</div>
    </div>
    <div class="card-title">Welcome Back</div>
    <div class="card-sub">Login to your restaurant panel</div>

    <div class="alert" id="alertBox"></div>

    <!-- GOOGLE SIGN IN -->
    <button class="btn-google" id="googleBtn" onclick="doGoogleLogin()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">OR login with email</div>
      <div class="divider-line"></div>
    </div>

    <!-- EMAIL LOGIN -->
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-input" id="email" type="email" placeholder="owner@restaurant.com"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="password-wrap">
        <input class="form-input" id="password" type="password" placeholder="Your password"/>
        <button type="button" class="eye-btn" onclick="togglePwd()">👁️</button>
      </div>
      <div class="forgot-link"><a href="#" onclick="doForgotPassword()">Forgot password?</a></div>
    </div>
    <button class="btn-submit" id="loginBtn" onclick="doLogin()">Login to Dashboard →</button>

    <div class="signup-link">Don't have an account? <a href="signup.html">Sign up free</a></div>
    <div class="back-link"><a href="../public/index.html">← Back to homepage</a></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      signInWithPopup,
      GoogleAuthProvider,
      sendPasswordResetEmail
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD8_c3y8cUP3w1uG7CL3GGn_GqraWxbdWs",
      authDomain: "ar-menu-39559.firebaseapp.com",
      projectId: "ar-menu-39559",
      storageBucket: "ar-menu-39559.firebasestorage.app",
      messagingSenderId: "919934973947",
      appId: "1:919934973947:web:c9bba718bcbc8ba6967d5e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();

    // ── GOOGLE LOGIN ──
    window.doGoogleLogin = async function() {
      const btn = document.getElementById('googleBtn');
      btn.disabled = true;
      btn.innerHTML = `<svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> ⏳ Connecting...`;

      try {
        const result = await signInWithPopup(auth, googleProvider);
        const user = result.user;

        // Check if restaurant profile exists, if not create one
        const restRef = doc(db, 'restaurants', user.uid);
        const restDoc = await getDoc(restRef);

        if (!restDoc.exists()) {
          // New user via Google — create profile
          await setDoc(restRef, {
            uid: user.uid,
            restaurantName: user.displayName || 'My Restaurant',
            ownerName: user.displayName || '',
            email: user.email,
            phone: '',
            city: '',
            restaurantType: '',
            plan: 'trial',
            trialEnds: new Date(Date.now() + 14 * 24 * 60 * 60 * 1000),
            dishCount: 0,
            qrScansTotal: 0,
            isActive: true,
            signupMethod: 'google',
            createdAt: serverTimestamp()
          });
        }

        showAlert('success', '✅ Google login successful! Redirecting...');
        setTimeout(() => window.location.href = 'dashboard.html', 1000);

      } catch (err) {
        const msgs = {
          'auth/popup-closed-by-user': '⚠️ Popup closed. Please try again.',
          'auth/popup-blocked': '⚠️ Popup blocked by browser. Allow popups and retry.',
          'auth/cancelled-popup-request': '⚠️ Login cancelled.',
        };
        showAlert('error', msgs[err.code] || '❌ Google login failed: ' + err.message);
        btn.disabled = false;
        btn.innerHTML = `<svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Continue with Google`;
      }
    };

    // ── EMAIL LOGIN ──
    window.doLogin = async function() {
      const btn = document.getElementById('loginBtn');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) { showAlert('error','⚠️ Please enter email and password.'); return; }

      btn.disabled = true; btn.textContent = '⏳ Logging in...';

      try {
        await signInWithEmailAndPassword(auth, email, password);
        showAlert('success','✅ Login successful! Redirecting...');
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      } catch (err) {
        const msgs = {
          'auth/user-not-found': '❌ No account with this email.',
          'auth/wrong-password': '❌ Wrong password. Try again.',
          'auth/invalid-credential': '❌ Wrong email or password.',
          'auth/too-many-requests': '⚠️ Too many attempts. Try later.'
        };
        showAlert('error', msgs[err.code] || '❌ Login failed: ' + err.message);
        btn.disabled = false; btn.textContent = 'Login to Dashboard →';
      }
    };

    // ── FORGOT PASSWORD ──
    window.doForgotPassword = async function() {
      const email = document.getElementById('email').value.trim();
      if (!email) { showAlert('error','⚠️ Enter your email first, then click Forgot Password.'); return; }
      try {
        await sendPasswordResetEmail(auth, email);
        showAlert('success', '📧 Password reset email sent! Check your inbox.');
      } catch(err) {
        showAlert('error', '❌ ' + err.message);
      }
    };

    function showAlert(type, msg) {
      const el = document.getElementById('alertBox');
      el.className = 'alert ' + type;
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
  <script>
    function togglePwd(){const el=document.getElementById('password');el.type=el.type==='password'?'text':'password';}
    document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  </script>
</body>
</html>
