<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3D Models — ARMenu</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--primary:#00D4FF;--secondary:#7B2FFF;--bg:#050810;--bg2:#0a0f1e;--card:#111827;--text:#f0f4ff;--text-muted:#8892a4;--border:rgba(0,212,255,0.12);--success:#52c41a;--warning:#faad14;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);}
    .layout{display:flex;min-height:100vh;}
    .sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;z-index:50;}
    .sb-logo{padding:20px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
    .sb-logo-text{font-size:17px;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;font-size:14px;font-weight:500;color:var(--text-muted);text-decoration:none;transition:all 0.2s;margin:1px 8px;}
    .nav-item:hover{background:rgba(0,212,255,0.06);color:var(--text);}
    .nav-item.active{background:rgba(0,212,255,0.1);color:var(--primary);font-weight:700;border:1px solid rgba(0,212,255,0.15);}
    .main{margin-left:240px;flex:1;}
    .topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;}
    .topbar-title{font-size:20px;font-weight:800;}
    .logout-btn{padding:8px 16px;background:rgba(255,77,79,0.1);border:1px solid rgba(255,77,79,0.3);color:#ff4d4f;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;}
    .content{padding:28px;}
    .ai-tools-banner{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
    .ai-tool-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;transition:all 0.2s;cursor:pointer;}
    .ai-tool-card:hover{border-color:rgba(0,212,255,0.3);transform:translateY(-2px);}
    .tool-icon{font-size:28px;margin-bottom:6px;}
    .tool-name{font-size:13px;font-weight:700;margin-bottom:2px;}
    .tool-status{font-size:11px;padding:2px 8px;border-radius:99px;display:inline-block;}
    .status-active{background:rgba(82,196,26,0.1);color:var(--success);}
    .status-free{background:rgba(0,212,255,0.1);color:var(--primary);}
    .models-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}
    .model-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:all 0.3s;}
    .model-card:hover{border-color:rgba(0,212,255,0.3);transform:translateY(-3px);}
    .model-preview{height:120px;background:linear-gradient(135deg,rgba(0,212,255,0.05),rgba(123,47,255,0.05));display:flex;align-items:center;justify-content:center;font-size:48px;position:relative;}
    .model-tag{position:absolute;top:8px;right:8px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;}
    .tag-3d{background:rgba(0,212,255,0.15);color:var(--primary);}
    .tag-no{background:rgba(250,173,20,0.1);color:var(--warning);}
    .model-body{padding:12px;}
    .model-name{font-size:13px;font-weight:700;margin-bottom:8px;}
    .model-actions{display:flex;gap:6px;}
    .action-btn{flex:1;padding:7px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s;}
    .action-btn.ai{background:rgba(123,47,255,0.1);border-color:rgba(123,47,255,0.3);color:var(--secondary);}
    .action-btn:hover{border-color:var(--primary);color:var(--primary);}
    @media(max-width:768px){.ai-tools-banner{grid-template-columns:1fr 1fr;}.main{margin-left:0;}.sidebar{display:none;}}
  </style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <div class="sb-logo"><span style="font-size:22px;">🍽️</span><div class="sb-logo-text">ARMenu</div></div>
    <nav style="padding:14px 0;">
      <a class="nav-item" href="dashboard.html">🏠 Dashboard</a>
      <a class="nav-item" href="dishes.html">🍽️ My Dishes</a>
      <a class="nav-item" href="qr-codes.html">🔲 QR Codes</a>
      <a class="nav-item active" href="3d-models.html">🎲 3D Models</a>
      <a class="nav-item" href="analytics.html">📊 Analytics</a>
      <a class="nav-item" href="subscription.html">💳 Subscription</a>
      <a class="nav-item" href="settings.html">⚙️ Settings</a>
    </nav>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">🎲 3D Models</div>
      <a class="logout-btn" href="login.html">Logout</a>
    </div>
    <div class="content">
      <div class="ai-tools-banner">
        <div class="ai-tool-card"><div class="tool-icon">🤖</div><div class="tool-name">Meshy.ai</div><div class="tool-status status-active">Primary</div></div>
        <div class="ai-tool-card"><div class="tool-icon">⚡</div><div class="tool-name">Tripo3D</div><div class="tool-status status-free">Fallback 1</div></div>
        <div class="ai-tool-card"><div class="tool-icon">🌟</div><div class="tool-name">Luma AI</div><div class="tool-status status-free">Fallback 2</div></div>
        <div class="ai-tool-card"><div class="tool-icon">🎨</div><div class="tool-name">Manual Upload</div><div class="tool-status status-free">.glb/.gltf</div></div>
      </div>
      <div style="font-size:15px;font-weight:700;margin-bottom:14px;">Your Dish Models</div>
      <div class="models-grid" id="modelsGrid"><div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);">⏳ Loading...</div></div>
    </div>
  </div>
</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
  import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
  const firebaseConfig={apiKey:"AIzaSyD8_c3y8cUP3w1uG7CL3GGn_GqraWxbdWs",authDomain:"ar-menu-39559.firebaseapp.com",projectId:"ar-menu-39559",storageBucket:"ar-menu-39559.firebasestorage.app",messagingSenderId:"919934973947",appId:"1:919934973947:web:c9bba718bcbc8ba6967d5e"};
  const auth=getAuth(initializeApp(firebaseConfig));
  const db=getFirestore(initializeApp(firebaseConfig));
  const emojis={'Starter':'🥗','Main Course':'🍛','Dessert':'🍨','Beverage':'🥤','Other':'🍽️'};
  onAuthStateChanged(auth,async user=>{
    if(!user){window.location.href='login.html';return;}
    const snap=await getDocs(query(collection(db,'dishes'),where('restaurantId','==',user.uid)));
    const dishes=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(!dishes.length){document.getElementById('modelsGrid').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);">No dishes yet. <a href="dishes.html" style="color:var(--primary);">Add dishes first →</a></div>';return;}
    document.getElementById('modelsGrid').innerHTML=dishes.map(d=>`
      <div class="model-card">
        <div class="model-preview">${emojis[d.category]||'🍽️'}<span class="model-tag ${d.has3D?'tag-3d':'tag-no'}">${d.has3D?'🎲 3D':'⚠️ No 3D'}</span></div>
        <div class="model-body">
          <div class="model-name">${d.name}</div>
          <div class="model-actions">
            <button class="action-btn ai" onclick="generateAI('${d.id}','${d.name}')">🤖 AI Gen</button>
            <button class="action-btn" onclick="alert('Upload .glb file from Dishes page → Edit dish')">📁 Upload</button>
          </div>
        </div>
      </div>`).join('');
  });
  window.generateAI=function(id,name){
    if(confirm(`Generate 3D model for "${name}" using AI?\n\nThis will use Meshy.ai API. Make sure API key is set in Admin Panel.`))
      alert('🤖 AI generation triggered!\n\nIn production: connects to Meshy.ai API → generates .glb → saves to Firebase Storage → attaches to dish.');
  };
</script>
</body>
</html>
